<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Responsive weather app using Fetch API with real-time data, search history, animations, and modern UI."
    />
    <title>weather-app</title>
    <link rel="stylesheet" href="./src/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <h2>Weather <span>Dashboard</span></h2>
      </nav>
    </header>
    <main class="container">
      <h1>Weather</h1>

      <!-- Weather form -->
      <form id="weather-form">
        <input
          type="text"
          id="city"
          placeholder="Enter city name..."
          required
          autocomplete="off"
        />

        <button type="submit">Search</button>
      </form>

      <!-- History -->
      <div id="history" class="history"></div>

      <!-- Output -->
      <div id="output" class="weather-output"></div>
    </main>

    <footer class="footer">
      <p>© 2026 Weather Dashboard • <span>Built by Irfan</span></p>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
